<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Crawler - Path Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 App Crawler - Path Manager</h1>
            <p>AI-Powered Mobile Application Crawler</p>
        </header>

        <main>
            <section class="paths-section">
                <div class="section-header">
                    <h2>Crawler Paths</h2>
                    <button id="refreshBtn" class="btn btn-primary">Refresh</button>
                </div>
                
                <div id="pathsContainer" class="paths-container">
                    <div class="loading">Loading paths...</div>
                </div>
            </section>

            <section id="pathDetails" class="path-details" style="display: none;">
                <div class="section-header">
                    <h2>Path Details</h2>
                    <button id="closeDetailsBtn" class="btn btn-secondary">Close</button>
                </div>

                <div id="pathInfo" class="path-info"></div>
                
                <div class="edit-form" id="editForm" style="display: none;">
                    <h3>Edit Path</h3>
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="editName" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <textarea id="editDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <button id="saveBtn" class="btn btn-primary">Save</button>
                    <button id="cancelEditBtn" class="btn btn-secondary">Cancel</button>
                </div>

                <div id="stepsContainer" class="steps-container"></div>
                
                <div id="interventionsContainer" class="interventions-container"></div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
